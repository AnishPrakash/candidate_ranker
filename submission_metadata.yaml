# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for architectural discussion, code review, and debugging across
  all pipeline phases. All engineering decisions — scoring formulas, honeypot
  detection logic, hybrid retrieval design, LTR feature set, and NLG template
  structure — were designed, implemented, and validated by the team.
  No candidate data was fed to any LLM at any point.
  The ranking pipeline (rank.py) makes zero external API calls.

# ============================================================================
# Methodology summary (≤ 200 words)
# ============================================================================
methodology_summary: |
  Multi-stage hybrid retrieval and learning-to-rank pipeline.

  Offline pre-computation (precompute.py): all 100K candidate profiles are
  embedded using all-MiniLM-L6-v2 and indexed in FAISS (IVFFlat, cosine
  similarity). A BM25Okapi index is built over concatenated skill names and
  career descriptions. Tabular features (availability index, market validation
  index, skill authenticity score, honeypot flags, experience band, location
  score, notice period modifier) are pre-computed and saved as Parquet.
  An XGBoost LambdaMART model is trained on synthetic pairwise preferences
  derived from JD constraints, directly optimising NDCG.

  Online ranking (rank.py, ≤ 5 min CPU): FAISS and BM25 each retrieve 2000
  candidates; Reciprocal Rank Fusion merges them to 1000. Chronological
  honeypot detection and hard JD disqualifiers prune the pool. XGBoost
  re-scores the survivors; micro-float tie-breaking on github_activity_score
  preserves P@10 precision. Reasoning is generated by a deterministic NLG
  engine drawing from 12+ signal-derived fact slots — zero hallucination risk,
  full variation, specific JD connection for every candidate.

  Runtime: ~2 minutes. Peak RAM: ~3 GB. Disk (artifacts): ~242 MB.

